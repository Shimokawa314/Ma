<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1F0EC;
    --panel: #FFFFFF;
    --panel-line: rgba(20,20,20,0.10);
    --ink: #141414;
    --ink-mid: #4A4844;
    --ink-soft: rgba(20,20,20,0.14);
    --ink-shadow: rgba(20,20,20,0.20);
    --text: #141414;
    --text-muted: #6E6B66;
    --text-faint: #A19D97;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 20px 60px;
    background: var(--bg);
  }

  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding-top: 8px;
  }

  .mark {
    font-family: 'Shippori Mincho', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
  }

  .mark .dot {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    transition: opacity 0.6s ease;
  }

  .mark.achieved .dot { opacity: 0.55; }

  .tagline {
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 6px;
    background: rgba(20,20,20,0.06);
    padding: 4px;
    border-radius: 12px;
  }

  .tab-btn {
    flex: 1;
    appearance: none;
    border: none;
    background: transparent;
    padding: 10px 0;
    border-radius: 9px;
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .tab-btn.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(20,20,20,0.10);
  }

  .view { display: none; flex-direction: column; gap: 22px; }
  .view.active { display: flex; }

  .data-subview { display: none; flex-direction: column; gap: 22px; }
  .data-subview.active { display: flex; }

  /* ---------- Ring ---------- */
  .ring-wrap {
    position: relative;
    width: 264px;
    height: 264px;
    margin: 0 auto;
  }

  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }

  .ring-track {
    fill: none;
    stroke: rgba(20,20,20,0.10);
    stroke-width: 7;
  }

  .ring-progress {
    fill: none;
    stroke: var(--ink-mid);
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1), stroke 0.6s ease;
  }

  .ring-progress.achieved { stroke: var(--ink); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
  }

  .elapsed {
    font-family: 'IBM Plex Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1;
    color: var(--text);
  }

  .elapsed-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .status-msg {
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--text-muted);
    max-width: 170px;
    line-height: 1.5;
  }

  .status-msg.achieved { color: var(--ink); }

  /* ---------- Record button ---------- */
  .record-btn {
    appearance: none;
    border: none;
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    background: var(--ink);
    color: var(--bg);
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 10px 24px -10px var(--ink-shadow);
  }

  .record-btn:active { transform: scale(0.97); }

  .sub-actions {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .undo-link {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 12px;
    letter-spacing: 0.03em;
    cursor: pointer;
    padding: 6px 10px;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(163,143,114,0.5);
  }

  .undo-link:hover { color: var(--text-muted); }

  /* ---------- Panels ---------- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 18px;
    padding: 18px 20px 14px;
  }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .panel-title {
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .panel-count {
    font-family: 'IBM Plex Mono', sans-serif;
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .panel-count b {
    color: var(--text);
    font-size: 15px;
  }

  .log-list {
    list-style: none;
    max-height: 220px;
    overflow-y: auto;
  }

  .log-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--panel-line);
    font-size: 13.5px;
  }

  .log-row:last-child { border-bottom: none; }

  .log-time {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .log-gap {
    color: var(--text-faint);
    font-size: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 22px 8px 18px;
    color: var(--text-faint);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ---------- Range toggle (data view) ---------- */
  .range-toggle {
    display: flex;
    gap: 6px;
  }

  .range-btn {
    appearance: none;
    border: 1px solid rgba(20,20,20,0.16);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }

  .range-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  /* ---------- Bar chart ---------- */
  .bar-chart {
    display: flex;
    align-items: stretch;
    gap: 4px;
    height: 120px;
    padding-top: 6px;
  }

  .bar-col {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .bar-track {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }

  .bar-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
  }

  .bar-fill {
    width: 100%;
    max-width: 22px;
    background: var(--ink);
    border-radius: 5px 5px 3px 3px;
    min-height: 3px;
    transition: height 0.5s ease;
  }

  .bar-label {
    height: 14px;
    margin-top: 8px;
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: visible;
  }

  /* ---------- Hour-of-day list (horizontal bars) ---------- */
  .hist-list {
    display: flex;
    flex-direction: column;
  }

  .hist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }

  .hist-label {
    width: 68px;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .hist-track {
    flex: 1;
    height: 9px;
    background: rgba(20,20,20,0.08);
    border-radius: 999px;
    overflow: hidden;
  }

  .hist-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  .hist-value {
    width: 22px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ---------- Weekly timeline ---------- */
  .timeline-day {
    padding: 12px 0;
    border-bottom: 1px solid var(--panel-line);
  }

  .timeline-day:last-child { border-bottom: none; }

  .timeline-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .timeline-head b { color: var(--text); font-family: 'IBM Plex Mono', monospace; }

  .timeline-track {
    position: relative;
    height: 14px;
    background: rgba(20,20,20,0.07);
    border-radius: 999px;
    margin-bottom: 6px;
  }

  .timeline-dot {
    position: absolute;
    top: 50%;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink);
    transform: translate(-50%, -50%);
    border: 1.5px solid var(--panel);
  }

  .timeline-times {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.6;
  }

  .empty-state.small { padding: 12px 0; }

  /* ---------- Money panel ---------- */
  .money-row {
    display: flex;
    gap: 12px;
  }

  .money-row.three {
    gap: 8px;
  }

  .money-row.three .money-item {
    padding: 12px 10px 10px;
  }

  .money-row.three .money-label {
    font-size: 11px;
  }

  .money-row.three .money-value {
    font-size: 17px;
  }

  .money-item {
    flex: 1;
    background: rgba(20,20,20,0.04);
    border-radius: 12px;
    padding: 14px 14px 12px;
  }

  .money-label {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .money-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .money-unit {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 3px;
  }

  /* ---------- Settings panel ---------- */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--panel-line);
  }

  .settings-row:last-of-type { border-bottom: none; }

  .settings-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .settings-input {
    width: 96px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text);
    background: rgba(20,20,20,0.04);
    border: 1px solid var(--panel-line);
    border-radius: 8px;
    padding: 6px 10px;
  }

  .settings-save-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }

  .settings-save-btn {
    appearance: none;
    border: none;
    background: var(--ink);
    color: var(--bg);
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 10px;
    cursor: pointer;
  }

  .settings-saved-msg {
    font-size: 12px;
    color: var(--text-faint);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .settings-saved-msg.show { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .ring-progress, .record-btn, .mark .dot, .bar-fill { transition: none; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="mark" id="mark">間<span class="dot" id="markDot">-ma-</span></div>
    <div class="tagline">次の一服までの、ひと呼吸。</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-view="record">記録</button>
    <button class="tab-btn" data-view="data">データ</button>
  </nav>

  <!-- ============ 記録タブ ============ -->
  <section class="view active" id="view-record">

    <div class="ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="88"></circle>
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="553"></circle>
      </svg>
      <div class="ring-center">
        <div class="elapsed" id="elapsedText">--:--</div>
        <div class="elapsed-label" id="elapsedLabel">記録なし</div>
        <div class="status-msg" id="statusMsg">下のボタンで最初の記録をつけましょう</div>
      </div>
    </div>

    <div>
      <button class="record-btn" id="recordBtn">吸った時刻を記録する</button>
      <div class="sub-actions">
        <button class="undo-link" id="undoBtn" style="display:none;">直前の記録を取り消す</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">タバコ代</div>
      </div>
      <div class="money-row three">
        <div class="money-item">
          <div class="money-label">今日</div>
          <div class="money-value"><span id="moneyToday">0</span><span class="money-unit">円</span></div>
        </div>
        <div class="money-item">
          <div class="money-label">今週</div>
          <div class="money-value"><span id="moneyWeek">0</span><span class="money-unit">円</span></div>
        </div>
        <div class="money-item">
          <div class="money-label">今月</div>
          <div class="money-value"><span id="moneyMonth">0</span><span class="money-unit">円</span></div>
        </div>
      </div>
    </div>

  </section>

  <!-- ============ データタブ ============ -->
  <section class="view" id="view-data">

    <div class="range-toggle">
      <button class="range-btn active" data-subview="week">過去1週間</button>
      <button class="range-btn" data-subview="month">過去1ヶ月</button>
      <button class="range-btn" data-subview="settings">設定</button>
    </div>

    <!-- ---- 過去1週間 ---- -->
    <div class="data-subview active" id="subview-week">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">本数の推移</div>
          <div class="panel-count"><b id="weekRangeTotal">0</b> 本合計 / <b id="weekRangeCost">0</b>円</div>
        </div>
        <div class="bar-chart" id="weekBarChart"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">過去7日間の時刻</div>
        </div>
        <div id="weekTimeline"></div>
        <div class="empty-state small" id="weekEmpty" style="display:none;">この期間の記録はありません</div>
      </div>
    </div>

    <!-- ---- 過去1ヶ月 ---- -->
    <div class="data-subview" id="subview-month">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">本数の推移</div>
          <div class="panel-count"><b id="monthRangeTotal">0</b> 本合計 / <b id="monthRangeCost">0</b>円</div>
        </div>
        <div class="bar-chart" id="monthBarChart"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">よく吸う時間帯</div>
        </div>
        <div class="hist-list" id="histChart"></div>
      </div>
    </div>

    <!-- ---- 設定 ---- -->
    <div class="data-subview" id="subview-settings">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">設定</div>
        </div>
        <div class="settings-row">
          <label class="settings-label" for="goalMinutesInput">目標時間(分)</label>
          <input class="settings-input" type="number" id="goalMinutesInput" min="1" step="1">
        </div>
        <div class="settings-row">
          <label class="settings-label" for="packPriceInput">1箱の値段(円)</label>
          <input class="settings-input" type="number" id="packPriceInput" min="0" step="10">
        </div>
        <div class="settings-row">
          <label class="settings-label" for="packCountInput">1箱の本数</label>
          <input class="settings-input" type="number" id="packCountInput" min="1" step="1">
        </div>
        <div class="settings-save-row">
          <button class="settings-save-btn" id="saveSettingsBtn">保存する</button>
          <span class="settings-saved-msg" id="settingsSavedMsg">保存しました</span>
        </div>
      </div>
    </div>

  </section>

</div>

<script>
  const STORAGE_KEY = 'ma-smoke-log-v1';
  const SETTINGS_KEY = 'ma-settings-v1';
  const RETENTION_DAYS = 30;             // データ保持期間
  const RING_CIRCUMFERENCE = 2 * Math.PI * 88;

  const DEFAULT_SETTINGS = {
    goalMinutes: 60,
    packPrice: 600,
    packCount: 20,
  };

  const el = {
    mark: document.getElementById('mark'),
    ring: document.getElementById('ringProgress'),
    elapsedText: document.getElementById('elapsedText'),
    elapsedLabel: document.getElementById('elapsedLabel'),
    statusMsg: document.getElementById('statusMsg'),
    recordBtn: document.getElementById('recordBtn'),
    undoBtn: document.getElementById('undoBtn'),
    moneyToday: document.getElementById('moneyToday'),
    moneyWeek: document.getElementById('moneyWeek'),
    moneyMonth: document.getElementById('moneyMonth'),
    tabs: document.querySelectorAll('.tab-btn'),
    views: document.querySelectorAll('.view'),
    subTabs: document.querySelectorAll('.range-btn'),
    subviews: document.querySelectorAll('.data-subview'),
    weekRangeTotal: document.getElementById('weekRangeTotal'),
    weekRangeCost: document.getElementById('weekRangeCost'),
    monthRangeTotal: document.getElementById('monthRangeTotal'),
    monthRangeCost: document.getElementById('monthRangeCost'),
    weekBarChart: document.getElementById('weekBarChart'),
    monthBarChart: document.getElementById('monthBarChart'),
    histChart: document.getElementById('histChart'),
    weekTimeline: document.getElementById('weekTimeline'),
    weekEmpty: document.getElementById('weekEmpty'),
    goalMinutesInput: document.getElementById('goalMinutesInput'),
    packPriceInput: document.getElementById('packPriceInput'),
    packCountInput: document.getElementById('packCountInput'),
    saveSettingsBtn: document.getElementById('saveSettingsBtn'),
    settingsSavedMsg: document.getElementById('settingsSavedMsg'),
  };

  el.ring.style.strokeDasharray = RING_CIRCUMFERENCE;

  let currentDataSubview = 'week';

  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      const parsed = raw ? JSON.parse(raw) : {};
      return { ...DEFAULT_SETTINGS, ...parsed };
    } catch (e) {
      return { ...DEFAULT_SETTINGS };
    }
  }

  function saveSettings(s) {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  }

  let settings = loadSettings();

  function loadLog() {
    let data = [];
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      data = raw ? JSON.parse(raw) : [];
    } catch (e) {
      data = [];
    }
    const cutoff = Date.now() - RETENTION_DAYS * 24 * 60 * 60 * 1000;
    const pruned = data.filter(ts => ts >= cutoff);
    if (pruned.length !== data.length) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pruned));
    }
    return pruned;
  }

  function saveLog(log) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
  }

  let log = loadLog();

  function isSameDay(ts, ref) {
    const a = new Date(ts), b = new Date(ref);
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth() === b.getMonth() &&
           a.getDate() === b.getDate();
  }

  function formatClock(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function formatShortDate(ts) {
    const d = new Date(ts);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }

  function formatWeekday(ts) {
    return ['日','月','火','水','木','金','土'][new Date(ts).getDay()];
  }

  function formatElapsed(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) {
      return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  function statusFor(ms, goalMs) {
    const min = ms / 60000;
    const goalMin = goalMs / 60000;
    if (min >= goalMin) return { msg: `${goalMin}分達成。よくがんばりました 🎉`, achieved: true };
    if (min >= goalMin * 0.75) return { msg: 'あと少し。ここが一番の踏ん張りどころ', achieved: false };
    if (min >= goalMin * 0.25) return { msg: '順調です。このまま伸ばしていきましょう', achieved: false };
    return { msg: 'まずはここから。深呼吸してみましょう', achieved: false };
  }

  // ---------- 週/月の起点 ----------

  function startOfDay(ref) {
    const d = new Date(ref);
    d.setHours(0,0,0,0);
    return d.getTime();
  }

  function startOfWeekMonday(ref) {
    const d = new Date(ref);
    d.setHours(0,0,0,0);
    const day = d.getDay(); // 0=Sun ... 6=Sat
    const diff = (day === 0 ? -6 : 1) - day; // Mondayまで戻る日数
    d.setDate(d.getDate() + diff);
    return d.getTime();
  }

  function startOfMonth(ref) {
    const d = new Date(ref);
    d.setHours(0,0,0,0);
    d.setDate(1);
    return d.getTime();
  }

  // ---------- 記録タブ ----------

  function renderMoneyPanel() {
    const perCigarette = settings.packCount > 0 ? settings.packPrice / settings.packCount : 0;

    const todayStart = startOfDay(Date.now());
    const weekStart = startOfWeekMonday(Date.now());
    const monthStart = startOfMonth(Date.now());

    const todayCount = log.filter(ts => ts >= todayStart).length;
    const weekCount = log.filter(ts => ts >= weekStart).length;
    const monthCount = log.filter(ts => ts >= monthStart).length;

    el.moneyToday.textContent = Math.round(todayCount * perCigarette).toLocaleString();
    el.moneyWeek.textContent = Math.round(weekCount * perCigarette).toLocaleString();
    el.moneyMonth.textContent = Math.round(monthCount * perCigarette).toLocaleString();
  }

  function tick() {
    const goalMs = settings.goalMinutes * 60 * 1000;

    if (log.length === 0) {
      el.elapsedText.textContent = '--:--';
      el.elapsedLabel.textContent = '記録なし';
      el.statusMsg.textContent = '下のボタンで最初の記録をつけましょう';
      el.statusMsg.classList.remove('achieved');
      el.mark.classList.remove('achieved');
      el.ring.classList.remove('achieved');
      el.ring.style.strokeDashoffset = RING_CIRCUMFERENCE;
      return;
    }

    const last = log[log.length - 1];
    const elapsedMs = Date.now() - last;
    const progress = Math.min(elapsedMs / goalMs, 1);
    const offset = RING_CIRCUMFERENCE * (1 - progress);
    el.ring.style.strokeDashoffset = offset;

    el.elapsedText.textContent = formatElapsed(elapsedMs);
    el.elapsedLabel.textContent = elapsedMs >= goalMs ? '目標達成後の経過' : '経過時間';

    const status = statusFor(elapsedMs, goalMs);
    el.statusMsg.textContent = status.msg;
    el.statusMsg.classList.toggle('achieved', status.achieved);
    el.mark.classList.toggle('achieved', status.achieved);
    el.ring.classList.toggle('achieved', status.achieved);
  }

  // ---------- データタブ:共通バーチャート描画 ----------

  function renderBarChart(container, totalEl, costEl, rangeDays) {
    const days = [];
    for (let i = rangeDays - 1; i >= 0; i--) {
      days.push(Date.now() - i * 24 * 60 * 60 * 1000);
    }
    const counts = days.map(ts => log.filter(l => isSameDay(l, ts)).length);
    const max = Math.max(1, ...counts);
    const total = counts.reduce((a,b) => a+b, 0);
    totalEl.textContent = total;

    const perCigarette = settings.packCount > 0 ? settings.packPrice / settings.packCount : 0;
    costEl.textContent = Math.round(total * perCigarette).toLocaleString();

    const showEveryLabel = rangeDays <= 7;
    container.innerHTML = days.map((ts, i) => {
      const h = Math.round((counts[i] / max) * 62) + 4;
      const label = showEveryLabel ? formatWeekday(ts) : (i % 5 === 0 ? formatShortDate(ts) : '');
      return `<div class="bar-col">
        <div class="bar-track">
          <div class="bar-value">${counts[i] > 0 ? counts[i] : ''}</div>
          <div class="bar-fill" style="height:${h}px;"></div>
        </div>
        <div class="bar-label">${label}</div>
      </div>`;
    }).join('');
  }

  function renderHistChart() {
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const inRange = log.filter(ts => ts >= cutoff);
    const counts = new Array(24).fill(0);
    inRange.forEach(ts => { counts[new Date(ts).getHours()]++; });
    const max = Math.max(1, ...counts);

    el.histChart.innerHTML = counts.map((c, hour) => {
      const pct = Math.round((c / max) * 100);
      const label = `${hour}時〜${hour + 1}時`;
      return `<div class="hist-row">
        <div class="hist-label">${label}</div>
        <div class="hist-track"><div class="hist-fill" style="width:${pct}%;"></div></div>
        <div class="hist-value">${c}</div>
      </div>`;
    }).join('');
  }

  function renderWeekTimeline() {
    const days = [];
    for (let i = 0; i < 7; i++) {
      days.push(Date.now() - i * 24 * 60 * 60 * 1000);
    }
    const rows = days.map(dayTs => {
      const entries = log.filter(ts => isSameDay(ts, dayTs)).sort((a,b) => a - b);
      if (entries.length === 0) return null;
      const dots = entries.map(ts => {
        const d = new Date(ts);
        const pct = ((d.getHours() * 60 + d.getMinutes()) / (24 * 60)) * 100;
        return `<div class="timeline-dot" style="left:${pct}%;"></div>`;
      }).join('');
      const times = entries.map(formatClock).join('  ');
      return `<div class="timeline-day">
        <div class="timeline-head">
          <span>${formatShortDate(dayTs)}(${formatWeekday(dayTs)})</span>
          <span><b>${entries.length}</b> 回</span>
        </div>
        <div class="timeline-track">${dots}</div>
        <div class="timeline-times">${times}</div>
      </div>`;
    }).filter(Boolean);

    if (rows.length === 0) {
      el.weekTimeline.innerHTML = '';
      el.weekEmpty.style.display = 'block';
    } else {
      el.weekEmpty.style.display = 'none';
      el.weekTimeline.innerHTML = rows.join('');
    }
  }

  function renderSettingsForm() {
    el.goalMinutesInput.value = settings.goalMinutes;
    el.packPriceInput.value = settings.packPrice;
    el.packCountInput.value = settings.packCount;
  }

  function renderWeekSubview() {
    renderBarChart(el.weekBarChart, el.weekRangeTotal, el.weekRangeCost, 7);
    renderWeekTimeline();
  }

  function renderMonthSubview() {
    renderBarChart(el.monthBarChart, el.monthRangeTotal, el.monthRangeCost, 30);
    renderHistChart();
  }

  function renderDataSubview() {
    if (currentDataSubview === 'week') renderWeekSubview();
    else if (currentDataSubview === 'month') renderMonthSubview();
    // settingsは静的フォームなので再描画不要(保存時のみ更新)
  }

  // ---------- 共通 ----------

  function render() {
    tick();
    renderMoneyPanel();
    renderDataSubview();
    el.undoBtn.style.display = log.length > 0 ? 'inline-block' : 'none';
  }

  el.recordBtn.addEventListener('click', () => {
    log.push(Date.now());
    saveLog(log);
    render();
  });

  el.undoBtn.addEventListener('click', () => {
    if (log.length === 0) return;
    log.pop();
    saveLog(log);
    render();
  });

  el.tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      el.tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.view;
      el.views.forEach(v => v.classList.toggle('active', v.id === `view-${target}`));
      if (target === 'data') renderDataSubview();
    });
  });

  el.subTabs.forEach(btn => {
    btn.addEventListener('click', () => {
      el.subTabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDataSubview = btn.dataset.subview;
      el.subviews.forEach(v => v.classList.toggle('active', v.id === `subview-${currentDataSubview}`));
      renderDataSubview();
    });
  });

  el.saveSettingsBtn.addEventListener('click', () => {
    const goalMinutes = Math.max(1, parseInt(el.goalMinutesInput.value, 10) || DEFAULT_SETTINGS.goalMinutes);
    const packPrice = Math.max(0, parseInt(el.packPriceInput.value, 10) || 0);
    const packCount = Math.max(1, parseInt(el.packCountInput.value, 10) || DEFAULT_SETTINGS.packCount);

    settings = { goalMinutes, packPrice, packCount };
    saveSettings(settings);
    renderSettingsForm();
    tick();
    renderMoneyPanel();
    renderDataSubview();

    el.settingsSavedMsg.classList.add('show');
    setTimeout(() => el.settingsSavedMsg.classList.remove('show'), 1800);
  });

  renderSettingsForm();
  setInterval(tick, 1000);
  render();
</script>

</body>
</html>
